<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Lower Thirds Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OBS Lower Thirds Control</h1>
        </header>

        <div class="global-settings">
            <span>Global Settings (Apply to All)</span>
            <i class="fa-solid fa-caret-down"></i>
        </div>

        <div class="panels-grid" id="panels-container">
            <!-- Panels will be generated by JS -->
        </div>

        <div class="action-buttons">
            <button class="btn-add" id="add-panel-btn">+ ADD LOWER THIRD PANEL</button>
            <button class="btn-start" id="start-sequence-btn"><i class="fa-solid fa-play"></i> START AUTO SEQUENCE</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
